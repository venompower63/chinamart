<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="50%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#e63946"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bgGrad)"/>
  
  <!-- City silhouette -->
  <path d="M50 512 L50 350 L80 350 L80 320 L100 320 L100 380 L130 380 L130 280 L160 280 L160 340 L190 340 L190 260 L220 260 L220 320 L260 320 L260 240 L300 240 L300 300 L330 300 L330 220 L370 220 L370 350 L400 350 L400 290 L430 290 L430 370 L462 370 L462 512 Z" fill="#0a0a1a" opacity="0.8"/>
  
  <!-- Building highlights -->
  <rect x="130" y="290" width="25" height="90" fill="#1a3a5c" opacity="0.6"/>
  <rect x="190" y="270" width="25" height="70" fill="#1a3a5c" opacity="0.6"/>
  <rect x="260" y="250" width="35" height="70" fill="#1a3a5c" opacity="0.6"/>
  <rect x="330" y="230" width="35" height="70" fill="#1a3a5c" opacity="0.6"/>
  
  <!-- Grid lines -->
  <line x1="0" y1="400" x2="512" y2="400" stroke="#e63946" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="350" x2="512" y2="350" stroke="#e63946" stroke-width="1" opacity="0.15"/>
  <line x1="0" y1="300" x2="512" y2="300" stroke="#e63946" stroke-width="1" opacity="0.1"/>
  
  <!-- CHINA text -->
  <text x="256" y="195" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="url(#textGrad)" text-anchor="middle" filter="url(#glow)">CHINA</text>
  
  <!-- HUB text -->
  <text x="256" y="275" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="url(#textGrad)" text-anchor="middle" filter="url(#glow)">HUB</text>
  
  <!-- Accent underline -->
  <rect x="130" y="290" width="252" height="4" fill="#f4a261" rx="2"/>
  
  <!-- Decorative dots -->
  <circle cx="100" cy="100" r="6" fill="#2a9d8f" opacity="0.8"/>
  <circle cx="412" cy="100" r="6" fill="#2a9d8f" opacity="0.8"/>
  <circle cx="80" cy="140" r="4" fill="#f4a261" opacity="0.6"/>
  <circle cx="432" cy="140" r="4" fill="#f4a261" opacity="0.6"/>
</svg>
