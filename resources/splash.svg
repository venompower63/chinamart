<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1284 2778">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1284" height="2778" fill="url(#bgGrad)"/>
  
  <!-- Logo/Image -->
  <image href="chinahub_icon.jpg" x="142" y="300" width="1000" height="1000" preserveAspectRatio="xMidYMid slice"/>
  
  <!-- Overlay gradient for text readability -->
  <rect x="0" y="1600" width="1284" height="1178" fill="url(#bgGrad)" opacity="0.85"/>
  
  <!-- App Name -->
  <text x="642" y="1750" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#e63946" text-anchor="middle" stroke="#f4a261" stroke-width="2">CHINA</text>
  <text x="642" y="1850" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#e63946" text-anchor="middle" stroke="#f4a261" stroke-width="2">HUB</text>
  
  <!-- Tagline -->
  <text x="642" y="2500" font-family="Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.7)" text-anchor="middle">Маркетплейс</text>
</svg>
