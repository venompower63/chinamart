<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="50%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#e63946"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="160" fill="url(#bgGrad)"/>
  
  <!-- City silhouette -->
  <path d="M100 1024 L100 700 L160 700 L160 640 L200 640 L200 760 L260 760 L260 560 L320 560 L320 680 L380 680 L380 520 L440 520 L440 640 L520 640 L520 480 L600 480 L600 600 L660 600 L660 440 L740 440 L740 700 L800 700 L800 580 L860 580 L860 740 L924 740 L924 1024 Z" fill="#0a0a1a" opacity="0.8"/>
  
  <!-- Building highlights -->
  <rect x="260" y="580" width="50" height="180" fill="#1a3a5c" opacity="0.6"/>
  <rect x="380" y="540" width="50" height="140" fill="#1a3a5c" opacity="0.6"/>
  <rect x="520" y="500" width="70" height="140" fill="#1a3a5c" opacity="0.6"/>
  <rect x="660" y="460" width="70" height="140" fill="#1a3a5c" opacity="0.6"/>
  
  <!-- Grid lines -->
  <line x1="0" y1="800" x2="1024" y2="800" stroke="#e63946" stroke-width="2" opacity="0.2"/>
  <line x1="0" y1="700" x2="1024" y2="700" stroke="#e63946" stroke-width="2" opacity="0.15"/>
  <line x1="0" y1="600" x2="1024" y2="600" stroke="#e63946" stroke-width="2" opacity="0.1"/>
  
  <!-- CHINA text -->
  <text x="512" y="380" font-family="Arial Black, sans-serif" font-size="144" font-weight="900" fill="url(#textGrad)" text-anchor="middle" filter="url(#glow)">CHINA</text>
  
  <!-- HUB text -->
  <text x="512" y="540" font-family="Arial Black, sans-serif" font-size="144" font-weight="900" fill="url(#textGrad)" text-anchor="middle" filter="url(#glow)">HUB</text>
  
  <!-- Accent underline -->
  <rect x="260" y="570" width="504" height="8" fill="#f4a261" rx="4"/>
  
  <!-- Decorative dots -->
  <circle cx="200" cy="200" r="12" fill="#2a9d8f" opacity="0.8"/>
  <circle cx="824" cy="200" r="12" fill="#2a9d8f" opacity="0.8"/>
  <circle cx="160" cy="280" r="8" fill="#f4a261" opacity="0.6"/>
  <circle cx="864" cy="280" r="8" fill="#f4a261" opacity="0.6"/>
</svg>
